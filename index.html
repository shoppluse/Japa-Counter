<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japa Counter - Auto Time Based</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #fff8e1, #ffe0b2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 430px;
      max-width: 100%;
    }

    h1 {
      color: #d35400;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    .main-count {
      font-size: 55px;
      color: #2c3e50;
      font-weight: bold;
      margin: 20px 0 10px;
    }

    .sub-info {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      gap: 10px;
    }

    .info-box {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      flex: 1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .info-box h3 {
      margin: 0;
      font-size: 16px;
      color: #7f8c8d;
    }

    .info-box .value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }

    .target {
      margin-top: 10px;
      font-size: 18px;
      color: #8e44ad;
      font-weight: bold;
    }

    .message {
      font-size: 18px;
      color: green;
      margin: 20px 0;
      min-height: 25px;
    }

    .timer-section {
      margin-top: 20px;
      padding: 15px;
      background-color: #fdfaf2;
      border-radius: 12px;
      border: 1px solid #f0d9a7;
    }

    .input-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .input-group label {
      font-size: 14px;
      color: #555;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 80px;
      padding: 8px;
      font-size: 16px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .interval-box {
      margin-top: 15px;
      background-color: #eef7ff;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      color: #2c3e50;
      font-weight: bold;
    }

    .status-box {
      margin-top: 10px;
      font-size: 16px;
      color: #2980b9;
      font-weight: bold;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .chant-btn {
      background-color: #27ae60;
      color: white;
    }

    .chant-btn:hover {
      background-color: #219150;
    }

    .reset-btn {
      background-color: #e74c3c;
      color: white;
    }

    .reset-btn:hover {
      background-color: #c0392b;
    }

    .start-btn {
      background-color: #3498db;
      color: white;
    }

    .start-btn:hover {
      background-color: #2c80b4;
    }

    .stop-btn {
      background-color: #f39c12;
      color: white;
    }

    .stop-btn:hover {
      background-color: #d68910;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🪔 Japa Counter</h1>
    <p>1 Round = 108 Beads | Daily Goal = 16 Rounds</p>

    <div class="main-count" id="beadCount">0 / 108</div>

    <div class="sub-info">
      <div class="info-box">
        <h3>Total Beads</h3>
        <div class="value" id="totalBeads">0</div>
      </div>

      <div class="info-box">
        <h3>Rounds</h3>
        <div class="value" id="roundCount">0</div>
      </div>
    </div>

    <div class="target" id="targetStatus">Target: 16 Rounds Remaining</div>

    <div class="message" id="message"></div>

    <!-- Existing manual buttons -->
    <button class="chant-btn" onclick="increaseCount()">Chant +1</button>
    <button class="reset-btn" onclick="resetCount()">Reset All</button>

    <!-- New Auto Timer Section -->
    <div class="timer-section">
      <h3 style="margin-top: 0; color: #d35400;">⏱ Auto Japa Counter</h3>
      <p style="margin-bottom: 10px;">Set your 1 round chanting time</p>

      <div class="input-row">
        <div class="input-group">
          <label>Minutes</label>
          <input type="number" id="minutesInput" value="5" min="0">
        </div>

        <div class="input-group">
          <label>Seconds</label>
          <input type="number" id="secondsInput" value="50" min="0" max="59">
        </div>
      </div>

      <div class="interval-box" id="intervalDisplay">
        1 Bead = 3.241 seconds
      </div>

      <div class="status-box" id="autoStatus">
        Auto Counter: Stopped
      </div>

      <button class="start-btn" onclick="startAutoCount()">▶️ Start Auto Count</button>
      <button class="stop-btn" onclick="stopAutoCount()">⏹ Stop Auto Count</button>
    </div>
  </div>

  <script>
    // ===== EXISTING VARIABLES =====
    let currentBeads = 0;
    let totalBeads = 0;
    let rounds = 0;
    const targetRounds = 16;

    // ===== NEW AUTO COUNTER VARIABLES =====
    let autoCounterInterval = null;
    let beadIntervalMs = 3240.74; // default for 5 min 50 sec

    // ===== EXISTING FUNCTION (same main logic) =====
    function increaseCount() {
      if (rounds < targetRounds) {
        currentBeads++;
        totalBeads++;

        document.getElementById("beadCount").innerText = currentBeads + " / 108";
        document.getElementById("totalBeads").innerText = totalBeads;

        if (currentBeads === 108) {
          rounds++;
          currentBeads = 0;

          document.getElementById("roundCount").innerText = rounds;
          document.getElementById("beadCount").innerText = currentBeads + " / 108";
          document.getElementById("message").innerText = "🎉 Round " + rounds + " completed! Hare Krishna!";

          if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200, 100, 400]);
          }

          let remainingRounds = targetRounds - rounds;

          if (remainingRounds > 0) {
            document.getElementById("targetStatus").innerText = "Target: " + remainingRounds + " Rounds Remaining";
          } else {
            document.getElementById("targetStatus").innerText = "🎉 16 Rounds Completed Today! Haribol!";
            document.getElementById("message").innerText = "🌸 All 16 rounds completed! Wonderful seva!";
            stopAutoCount(); // auto stop after 16 rounds
          }
        }
      }
    }

    // ===== EXISTING FUNCTION (extended to stop auto counter too) =====
    function resetCount() {
      currentBeads = 0;
      totalBeads = 0;
      rounds = 0;

      stopAutoCount();

      document.getElementById("beadCount").innerText = "0 / 108";
      document.getElementById("totalBeads").innerText = "0";
      document.getElementById("roundCount").innerText = "0";
      document.getElementById("targetStatus").innerText = "Target: 16 Rounds Remaining";
      document.getElementById("message").innerText = "";
    }

    // ===== NEW FUNCTION: calculate bead interval =====
    function calculateBeadInterval() {
      let minutes = parseInt(document.getElementById("minutesInput").value) || 0;
      let seconds = parseInt(document.getElementById("secondsInput").value) || 0;

      let totalSeconds = (minutes * 60) + seconds;

      if (totalSeconds <= 0) {
        totalSeconds = 350; // fallback to 5m 50s
        document.getElementById("minutesInput").value = 5;
        document.getElementById("secondsInput").value = 50;
      }

      let secondsPerBead = totalSeconds / 108;
      beadIntervalMs = secondsPerBead * 1000;

      document.getElementById("intervalDisplay").innerText =
        "1 Bead = " + secondsPerBead.toFixed(3) + " seconds";
    }

    // ===== NEW FUNCTION: start auto counting =====
    function startAutoCount() {
      if (autoCounterInterval !== null) {
        return; // already running
      }

      if (rounds >= targetRounds) {
        document.getElementById("message").innerText = "🌸 All 16 rounds already completed today!";
        return;
      }

      calculateBeadInterval();

      document.getElementById("autoStatus").innerText = "Auto Counter: Running ▶️";

      autoCounterInterval = setInterval(function () {
        increaseCount();
      }, beadIntervalMs);
    }

    // ===== NEW FUNCTION: stop auto counting =====
    function stopAutoCount() {
      if (autoCounterInterval !== null) {
        clearInterval(autoCounterInterval);
        autoCounterInterval = null;
      }

      document.getElementById("autoStatus").innerText = "Auto Counter: Stopped";
    }

    // ===== NEW: auto recalculate when user changes time =====
    document.getElementById("minutesInput").addEventListener("input", calculateBeadInterval);
    document.getElementById("secondsInput").addEventListener("input", calculateBeadInterval);

    // Initial calculation on page load
    calculateBeadInterval();
  </script>

</body>
          </html>
