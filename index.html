<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japa Counter - 16 Rounds</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #fff8e1, #ffe0b2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 400px;
    }

    h1 {
      color: #d35400;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    .main-count {
      font-size: 55px;
      color: #2c3e50;
      font-weight: bold;
      margin: 20px 0 10px;
    }

    .sub-info {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      gap: 10px;
    }

    .info-box {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      flex: 1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .info-box h3 {
      margin: 0;
      font-size: 16px;
      color: #7f8c8d;
    }

    .info-box .value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }

    .target {
      margin-top: 10px;
      font-size: 18px;
      color: #8e44ad;
      font-weight: bold;
    }

    .message {
      font-size: 18px;
      color: green;
      margin: 20px 0;
      min-height: 25px;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .chant-btn {
      background-color: #27ae60;
      color: white;
    }

    .chant-btn:hover {
      background-color: #219150;
    }

    .reset-btn {
      background-color: #e74c3c;
      color: white;
    }

    .reset-btn:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🪔 Japa Counter</h1>
    <p>1 Round = 108 Beads | Daily Goal = 16 Rounds</p>

    <div class="main-count" id="beadCount">0 / 108</div>

    <div class="sub-info">
      <div class="info-box">
        <h3>Total Beads</h3>
        <div class="value" id="totalBeads">0</div>
      </div>

      <div class="info-box">
        <h3>Rounds</h3>
        <div class="value" id="roundCount">0</div>
      </div>
    </div>

    <div class="target" id="targetStatus">Target: 16 Rounds Remaining</div>

    <div class="message" id="message"></div>

    <button class="chant-btn" onclick="increaseCount()">Chant +1</button>
    <button class="reset-btn" onclick="resetCount()">Reset All</button>
  </div>

  <script>
    let currentBeads = 0;
    let totalBeads = 0;
    let rounds = 0;
    const targetRounds = 16;

    function increaseCount() {
      if (rounds < targetRounds) {
        currentBeads++;
        totalBeads++;

        document.getElementById("beadCount").innerText = currentBeads + " / 108";
        document.getElementById("totalBeads").innerText = totalBeads;

        if (currentBeads === 108) {
          rounds++;
          currentBeads = 0;

          document.getElementById("roundCount").innerText = rounds;
          document.getElementById("beadCount").innerText = currentBeads + " / 108";
          document.getElementById("message").innerText = "🎉 Round " + rounds + " completed! Hare Krishna!";

          if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200, 100, 400]);
          }

          let remainingRounds = targetRounds - rounds;

          if (remainingRounds > 0) {
            document.getElementById("targetStatus").innerText = "Target: " + remainingRounds + " Rounds Remaining";
          } else {
            document.getElementById("targetStatus").innerText = "🎉 16 Rounds Completed Today! Haribol!";
            document.getElementById("message").innerText = "🌸 All 16 rounds completed! Wonderful seva!";
          }
        }
      }
    }

    function resetCount() {
      currentBeads = 0;
      totalBeads = 0;
      rounds = 0;

      document.getElementById("beadCount").innerText = "0 / 108";
      document.getElementById("totalBeads").innerText = "0";
      document.getElementById("roundCount").innerText = "0";
      document.getElementById("targetStatus").innerText = "Target: 16 Rounds Remaining";
      document.getElementById("message").innerText = "";
    }
  </script>

</body>
</html>
